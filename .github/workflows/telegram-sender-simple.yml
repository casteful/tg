name: Telegram Scheduled Sender (Simple)

# This workflow uses Session String only - the simplest and most reliable method
# Recommended for most users

on:
  # Schedule: 4 times a day (every 6 hours) in UTC
  # Adjust times as needed for your timezone
  schedule:
    - cron: '0 */6 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message (optional, leave empty for scheduled message)'
        required: false
        default: ''

jobs:
  send-message:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon cryptg
      
      - name: ✏️ Prepare message
        run: |
          if [ -n "${{ github.event.inputs.message }}" ]; then
            echo '{"default_target":"${{ secrets.TELEGRAM_TARGET_ENTITY }}","parse_mode":"md","messages":[{"time":"now","content":"${{ github.event.inputs.message }}"}]}' > messages.json
          fi
      
      - name: 🚀 Send Telegram message
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_TARGET_ENTITY: ${{ secrets.TELEGRAM_TARGET_ENTITY }}
        run: python telegram_sender.py
      
      - name: ✅ Done
        run: echo "Message sent at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
